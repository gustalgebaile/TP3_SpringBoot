# Configuração de Conexão (Ajuste usuário e senha caso a imagem Docker exija credenciais específicas)
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres

# Dialeto do PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# REGRA DE OURO PARA BANCOS LEGADOS: Nunca use 'create' ou 'update' aqui.
spring.jpa.hibernate.ddl-auto=validate

# Define o schema padrão, embora vamos forçar nas entidades por segurança
spring.jpa.properties.hibernate.default_schema=audit

# Exibe o SQL no console para ajudar no debug
spring.jpa.show-sql=true